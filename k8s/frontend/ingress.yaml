apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: junhugae.goorm.training
      http:
        paths:
          - backend:
              service:
                name: backend-service
                port:
                  number: 80
            path: /api(/|$)(.*)
            pathType: ImplementationSpecific
          - backend:
              service:
                name: frontend-service
                port:
                  number: 80
            path: /
            pathType: Prefix
